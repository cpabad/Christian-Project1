<!DOCTYPE html>
<html lang="en" data-theme="light">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Expense Reimbursement System</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
        <style>
            :root {
                --pico-primary: #0f766e;
                --pico-primary-background: #0f766e;
                --pico-primary-hover: #0b5f58;
                --pico-primary-hover-background: #0b5f58;
                --pico-primary-focus: rgba(15, 118, 110, 0.3);
                --pico-primary-underline: rgba(15, 118, 110, 0.5);
            }
            h1 { font-family: "Space Grotesk", var(--pico-font-family-sans-serif); letter-spacing: -0.02em; margin-bottom: 0.25rem; }
            nav strong { font-family: "Space Grotesk", var(--pico-font-family-sans-serif); }
        </style>
    </head>

    <body>
        <header class="container">
            <nav>
                <ul><li><strong>Expense Reimbursement</strong></li></ul>
                <ul>
                    <li><button id="homepage" class="secondary outline">Home</button></li>
                    <li><button id="logoutButton" class="secondary">Logout</button></li>
                </ul>
            </nav>
        </header>
        <main class="container">
            <hgroup>
                <h1>Submit a request</h1>
                <p>Enter the event and expense details, then submit.</p>
            </hgroup>
            <article id="divSubmitRequest">
                <input type="text" placeholder="Event Title" id="eventTitle" required />
                <div class="grid">
                    <input type="number" placeholder="Day (DD)" id="eventDay" required />
                    <input type="month" placeholder="Month" id="eventMonth" />
                    <input type="number" placeholder="Year (YYYY)" id="eventYear" required />
                </div>
                <div class="grid">
                    <input type="number" placeholder="Street Number" id="streetNumber" required />
                    <input type="text" placeholder="Street Name" id="streetName" required />
                </div>
                <div class="grid">
                    <input type="text" placeholder="City" id="city" required />
                    <input type="text" placeholder="State" id="state" required />
                    <input type="text" placeholder="Postal or Zip Code" id="zipCode" required />
                </div>
                <input type="number" step="0.01" placeholder="Dollar Amount Requested" id="amount" required />
                <button id="submitRequest">Submit Request</button>
            </article>
        </main>
        <script src="./JS/employeerequestsubmission.js"></script>
    </body>

</html>
